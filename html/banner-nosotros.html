<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="/css/styles.css" />
    <style>
      /* ── Margenes controlado ── */
      #carouselExampleSlidesOnly .carousel-item img {
        height: 500px;        
        object-fit: cover;
        object-position: center;
      }
    </style>
  </head>
  <body>

    <div id="carouselExampleSlidesOnly" class="carousel slide" data-bs-ride="carousel" data-bs-interval="2000">
      <div class="carousel-inner">

        <div class="carousel-item active">
          <img class="d-block w-100" src="../img-nosotros/Banner Nosotros 01.png" alt="Slide 1" />
        </div>

        <div class="carousel-item">
          <img class="d-block w-100" src="../img-nosotros/Banner Nosotros 02.png" alt="Slide 2" />
        </div>

        <div class="carousel-item">
          <img class="d-block w-100" src="../img-nosotros/Banner Nosotros 03.png" alt="Slide 3" />
        </div>

      </div>
    </div>

    <script src="js/script.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmB0I1fA2Gc8p7v5gS+RP/z4yQ5"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
